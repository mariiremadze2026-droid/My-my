<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ანბანის ფორტუნა - სრული ვერსია</title>
    <style>
        /* ანიმაციური ფონი */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(125deg, #141e30, #243b55, #0f2027);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ფონის ვარსკვლავები */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* მთავარი კონტეინერი - ზომა გაზრდილია უკეთესი ტევადობისთვის */
        .wheel-container {
            position: relative;
            width: 650px;
            height: 650px;
            margin-bottom: 30px;
            z-index: 1;
        }

        /* ანბანის დაფა */
        .clock-face {
            width: 100%;
            height: 100%;
            border: 6px solid rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            position: relative;
            background: rgba(20, 30, 48, 0.9);
            box-shadow: 0 0 40px rgba(52, 152, 219, 0.6), inset 0 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        /* ცენტრალური წერტილი */
        .clock-face::after {
            content: '';
            width: 20px;
            height: 20px;
            background-color: #e74c3c;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 12px #e74c3c;
        }

        /* ასოების სტილი - სრულად ოპტიმიზებული ტექსტის სწორი ჩვენებისთვის */
        .letter {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 1.3rem; /* ზომა დაბალანსებულია */
            font-weight: bold;
            color: #ffffff;
            padding: 12px; /* ასოები უფრო ახლოსაა კიდესთან, რაც ზრდის წრეს */
            box-sizing: border-box;
            transform-origin: center center;
        }

        /* კონტეინერი უშუალოდ ასოსთვის, რომ ბრუნვისას არ აირიოს ცენტრი */
        .letter-inner {
            display: inline-block;
            width: 30px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(52, 152, 219, 0.5);
        }

        /* მბრუნავი ისარი - სიგრძე მორგებულია ახალ ზომაზე */
        .pointer-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 6px;
            height: 280px;
            background: linear-gradient(to top, #e74c3c, #f1c40f);
            transform-origin: bottom center;
            margin-left: -3px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            z-index: 5;
            transition: transform 15s cubic-bezier(0.1, 0.8, 0.1, 1);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
        }

        /* ისრის წვერი */
        .pointer-hand::before {
            content: '';
            position: absolute;
            top: -14px;
            left: -7px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 18px solid #f1c40f;
        }

        /* დატრიალების ღილაკი */
        .spin-btn {
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
            transition: all 0.3s ease;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn:hover {
            background: linear-gradient(45deg, #2ecc71, #2196f3);
            box-shadow: 0 7px 25px rgba(33, 150, 243, 0.5);
            transform: translateY(-3px);
        }

        .spin-btn:disabled {
            background: #7f8c8d !important;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <svg class="stars" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10%" cy="20%" r="1.5" fill="#fff" opacity="0.6"/>
        <circle cx="30%" cy="80%" r="2" fill="#fff" opacity="0.4"/>
        <circle cx="75%" cy="15%" r="1" fill="#fff" opacity="0.8"/>
        <circle cx="85%" cy="70%" r="2.5" fill="#fff" opacity="0.5"/>
        <circle cx="45%" cy="35%" r="1.5" fill="#fff" opacity="0.7"/>
        <circle cx="60%" cy="90%" r="2" fill="#fff" opacity="0.3"/>
    </svg>

    <div class="wheel-container">
        <div class="clock-face" id="clockFace">
            <div class="pointer-hand" id="pointer"></div>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn">დაატრიალე</button>

    <script>
        // ქართული ანბანის 33-ვე ასო თანმიმდევრობით
        const alphabet = ["ა", "ბ", "გ", "დ", "ე", "ვ", "ზ", "თ", "ი", "კ", "ლ", "მ", "ნ", "ო", "პ", "ჟ", "რ", "ს", "ტ", "უ", "ფ", "ქ", "ღ", "ყ", "შ", "ჩ", "ც", "ძ", "წ", "ჭ", "ხ", "ჯ", "ჰ"];
        
        const clockFace = document.getElementById('clockFace');
        const pointer = document.getElementById('pointer');
        const spinBtn = document.getElementById('spinBtn');

        const totalLetters = alphabet.length;
        const degreeStep = 360 / totalLetters; 

        // ასოების წრეზე იდეალურად განლაგება
        alphabet.forEach((letter, index) => {
            const letterDiv = document.createElement('div');
            letterDiv.className = 'letter';
            
            const currentDegree = index * degreeStep;
            letterDiv.style.transform = `rotate(${currentDegree}deg)`;
            
            // ასოების ტექსტის გასწორება შიდა ბლოკით
            letterDiv.innerHTML = `<div class="letter-inner" style="transform: rotate(${-currentDegree}deg);">${letter}</div>`;
            
            clockFace.appendChild(letterDiv);
        });

        let currentRotation = 0;

        // ტრიალის ლოგიკა
        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;

            // მინიმუმ 8 სრული ბრუნი + შემთხვევითი ასო
            const extraRounds = 8 * 360; 
            const randomLetterIndex = Math.floor(Math.random() * totalLetters);
            const targetDegree = randomLetterIndex * degreeStep;

            // ახალი პოზიციის გამოთვლა
            currentRotation += extraRounds + targetDegree - (currentRotation % 360);

            // ისრის დატრიალება
            pointer.style.transform = `rotate(${currentRotation}deg)`;

            // ზუსტად 15 წამში (15000 მლ.წ) ღილაკის ხელახლა გააქტიურება
            setTimeout(() => {
                spinBtn.disabled = false;
            }, 15000);
        });
    </script>
</body>
</html>
