<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>ქართული ანბანის ისარი</title>
<style>
  body{
    font-family: sans-serif;
    background: linear-gradient(-45deg, #1a1a2e, #16213e, #e94560, #533483);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    min-height:100vh;
    margin:0;
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  #wheel-container{
    position:relative;
    width:400px;
    height:400px;
    margin:30px auto;
  }
  .letter{
    position:absolute;
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    font-weight:bold;
    border-radius:50%;
    background:#16213e;
    transition: background 0.3s, color 0.3s, transform 0.3s;
  }
  .letter.active{
    background:#e94560;
    color:white;
    transform: scale(1.3);
  }
  #arrow{
    position:absolute;
    top:50%;
    left:50%;
    width:8px;
    height:160px;
    background:#e94560;
    transform-origin: top center;
    border-radius:4px;
    transition: transform 1s cubic-bezier(.4,0,.2,1);
  }
  #center{
    position:absolute;
    top:50%;
    left:50%;
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    transform: translate(-50%,-50%);
    z-index:10;
  }
  input, button{
    padding:10px;
    font-size:18px;
    border-radius:8px;
    border:none;
    margin:5px;
  }
  button{
    background:#e94560;
    color:white;
    cursor:pointer;
    font-weight:bold;
  }
  button:disabled{
    background:#555;
    cursor:not-allowed;
  }
  #current{
    font-size:28px;
    margin-top:10px;
    min-height:40px;
    letter-spacing:4px;
    font-weight:bold;
  }
</style>
</head>
<body>

<h2>ანბანის ისარი 🔮</h2>
<div>
  <button id="startBtn">დაწყება 🎲</button>
</div>

<div id="wheel-container">
  <div id="arrow"></div>
  <div id="center"></div>
</div>

<div id="current"></div>

<script>
const boyNames = ["გიორგი","ლუკა","საბა","დავითი","ნიკა","ლევანი","გიგა","ირაკლი","ზურაბ","თორნიკე","ბექა","გურამ","ვახტანგ","ალექსანდრე","მიხეილ","გელა","არჩილ","ოთარ","გია","ლადო"];

let spinTimer = null;
let currentRotation = 0;

function startSpelling(){
  startBtn.disabled = true;
  currentDiv.textContent = "";
  letterEls.forEach(el => el.classList.remove('active'));

  // fast spin for 10 seconds
  arrow.style.transition = 'none';
  let spinSpeed = 0;
  const spinStart = Date.now();

  function spinFrame(){
    const elapsed = Date.now() - spinStart;
    if(elapsed < 10000){
      currentRotation += 25; // degrees per frame
      arrow.style.transform = 'rotate(' + currentRotation + 'deg)';
      spinTimer = requestAnimationFrame(spinFrame);
    } else {
      // finished spinning - pick random name
      const name = boyNames[Math.floor(Math.random() * boyNames.length)];
      arrow.style.transition = 'transform 1s cubic-bezier(.4,0,.2,1)';
      spellName(name);
    }
  }
  spinFrame();
}

function spellName(name){
  const queue = name.split('');
  let spelled = "";

  function nextLetter(){
    if(queue.length === 0){
      startBtn.disabled = false;
      return;
    }
    const ch = queue.shift();
    const idx = letters.indexOf(ch.toLowerCase());
    if(idx === -1){
      spelled += ch;
      currentDiv.textContent = spelled;
      setTimeout(nextLetter, 300);
      return;
    }
    const angle = (idx / letters.length) * 360;
    currentRotation = angle;
    arrow.style.transform = 'rotate(' + angle + 'deg)';

    letterEls.forEach(el => el.classList.remove('active'));
    setTimeout(() => {
      letterEls[idx].classList.add('active');
      spelled += ch;
      currentDiv.textContent = spelled;
      setTimeout(nextLetter, 800);
    }, 1000);
  }
  setTimeout(nextLetter, 600);
}
const letters = "აბგდევზთიკლმნოპჟრსტუფქღყშჩცძწჭხჯჰ".split('');
const container = document.getElementById('wheel-container');
const radius = 170;
const center = 200;

const letterEls = [];
letters.forEach((ltr, i) => {
  const angle = (i / letters.length) * 2 * Math.PI - Math.PI/2;
  const x = center + radius * Math.cos(angle) - 17;
  const y = center + radius * Math.sin(angle) - 17;
  const div = document.createElement('div');
  div.className = 'letter';
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.textContent = ltr;
  container.appendChild(div);
  letterEls.push(div);
});

const arrow = document.getElementById('arrow');
const currentDiv = document.getElementById('current');
const startBtn = document.getElementById('startBtn');

let queue = [];
let spelled = "";
let busy = false;

function startSpelling(){
  const text = document.getElementById('nameInput').value.trim();
  if(!text) return;
  queue = text.split('');
  spelled = "";
  currentDiv.textContent = "";
  letterEls.forEach(el => el.classList.remove('active'));
  arrow.style.transform = 'rotate(0deg)';
  startBtn.disabled = true;
  setTimeout(nextLetter, 600);
}

function nextLetter(){
  if(queue.length === 0){
    startBtn.disabled = false;
    return;
  }
  const ch = queue.shift();
  if(ch === ' '){
    spelled += ' ';
    currentDiv.textContent = spelled;
    setTimeout(nextLetter, 500);
    return;
  }
  const idx = letters.indexOf(ch.toLowerCase());
  if(idx === -1){
    spelled += ch;
    currentDiv.textContent = spelled;
    setTimeout(nextLetter, 300);
    return;
  }
  const angle = (idx / letters.length) * 360;
  arrow.style.transform = 'rotate(' + angle + 'deg)';

  letterEls.forEach(el => el.classList.remove('active'));
  setTimeout(() => {
    letterEls[idx].classList.add('active');
    spelled += ch;
    currentDiv.textContent = spelled;
    setTimeout(nextLetter, 800);
  }, 1000);
}

startBtn.addEventListener('click', startSpelling);
</script>

</body>
</html>
